name: Auto Fetch M3U8 Live Streams

on:
  workflow_dispatch: # 允许你手动点击按钮触发
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次

jobs:
  run-spider:
    runs-on: ubuntu-latest

    steps:
    # 1. 签出仓库代码
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境（彻底移除了 cache 配置，绝不会再报 requirements.txt 错误）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖库
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    # 4. 安装 Playwright 浏览器及系统依赖
    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium --with-deps

    # 5. 执行你的 Python 脚本
    - name: Run M3U8 Extractor Script
      run: |
        python WebFetch_m3u8/fetch_m3u8.py

    # 6. 【新增】自动将写入到 live_links.txt 的新链接提交并保存回 GitHub 仓库
    - name: Commit and Push live_links.txt
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add live_links.txt
        # 只有在文件有变动时才提交，防止没有新链接时报错中断
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live_links.txt" && git push)
