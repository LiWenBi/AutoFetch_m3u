name: Auto Fetch M3U8 Links

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  fetch_job:
    runs-on: ubuntu-latest
    steps:
    # 💡 建议将 checkout 保持在最新，自动适配 GitHub Actions 的 Node 24 环境
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 💡 核心修复：移除了引发报错的 cache: 'pip' 行，不再强制要求 requirements.txt 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure Playwright browsers are installed
      run: playwright install chromium --with-deps

    - name: Run Fetch Script
      run: python fetch_m3u8.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        
        if [ -f "live_links.txt" ]; then
          git add live_links.txt
          git diff --staged --quiet || (git commit -m "chore: auto update m3u8 links [skip ci]" && git push)
        else
          echo "⚠️ 未找到 live_links.txt 文件，跳过提交步骤。"
        fi
