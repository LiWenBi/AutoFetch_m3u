name: 自动获取m3u8链接

on:
  workflow_dispatch: # 允许你在 GitHub 页面手动点击按钮触发

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装 Chrome 浏览器及依赖项（用于 Selenium 运行）
    - name: Install Chrome and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        pip install selenium

    # 4. 执行 Python 脚本收集并去重
    - name: Run M3U8 Collector
      run: python fetch_m3u8.py

    # 5. 将更新后的 live_links.txt 文件自动提交回 GitHub 仓库
    - name: Commit and Push Changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user-email "github-actions[bot]@users.noreply.github.com"
        
        # 检查文件是否有变动，有变动则提交
        if [ -n "$(git status --porcelain live_links.txt)" ]; then
          git add live_links.txt
          git commit -m "自动更新：追加并去重 m3u8 链接 [skip ci]"
          git push
        else
          echo "链接无变化，无需更新。"
        fi
