name: Auto Fetch M3U8 Live Streams

# 触发条件
on:
  # 1. 允许你在 GitHub 网页端手动点击按钮触发运行
  workflow_dispatch:
  
  # 2. 定时任务：每小时自动运行一次（注：UTC 时间比北京时间慢 8 小时）
  schedule:
    - cron: '0 * * * *'

jobs:
  run-spider:
    runs-on: ubuntu-latest

    steps:
    # 第一步：下载你仓库中的 Python 代码
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 第二步：在云端安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 开启缓存加速后续运行

    # 第三步：安装 Python 依赖库
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    # 第四步：安装 Playwright 专属的 Chromium 浏览器内核及其系统依赖
    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium --with-deps

    # 第五步：执行你的 Python 脚本
    # 假设你的 Python 脚本文件名叫 main.py
    - name: Run M3U8 Extractor Script
      run: |
        python WebFetch_m3u8/fetch_m3u8.py
