name: Auto Fetch M3U8 Links

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# 💡 核心修正 1：显式赋予 Actions 机器人向仓库写入和提交代码的权限
permissions:
  contents: write

jobs:
  fetch_job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 💡 建议优化：开启 pip 缓存，下次运行时安装 playwright 会快很多
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    # 💡 核心修正 2：删除了无用的 setup-chrome 步骤，只保留 Playwright 官方规范安装
    # 使用 --with-deps 会自动安装 Ubuntu 运行无头浏览器所需的系统底层依赖（如 libgbm 等）
    - name: Ensure Playwright browsers are installed
      run: playwright install chromium --with-deps

    - name: Run Fetch Script
      run: python fetch_m3u8.py

    - name: Commit and Push Changes
      run: |
        # 💡 核心修正 3：修复了官方标准的 github-actions[bot] 邮箱格式
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 💡 建议优化：防错处理。如果你的 Python 脚本运行失败没有生成 live_links.txt，
        # git add 会报错。这里加上 -f 或判断文件是否存在更稳妥。
        if [ -f "live_links.txt" ]; then
          git add live_links.txt
          # 检查是否有文件变动，有变动才提交，防止无意义的报错
          git diff --staged --quiet || (git commit -m "chore: auto update m3u8 links [skip ci]" && git push)
        else
          echo "⚠️ 未找到 live_links.txt 文件，跳过提交步骤。"
        fi
